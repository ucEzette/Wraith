services:
  - type: worker
    name: wraith-sentinel
    env: docker
    dockerfilePath: Dockerfile.sentinel
    restartPolicy: always
    envVars:
      - key: PRIVATE_KEY
        sync: false
      - key: UNICHAIN_RPC_URL
        value: https://sepolia.unichain.org
      - key: WRAITH_HOOK_ADDRESS
        value: "0x83cabbF63Cbe0b7EaF14824F4C7529480fAC8280"
      - key: GENSYN_API_KEY
        sync: false

  - type: worker
    name: wraith-keeper
    env: docker
    dockerfilePath: Dockerfile.keeper
    restartPolicy: always
    envVars:
      - key: PRIVATE_KEY
        sync: false
      - key: UNICHAIN_RPC_URL
        value: https://sepolia.unichain.org
      - key: WRAITH_HOOK_ADDRESS
        value: "0x83cabbF63Cbe0b7EaF14824F4C7529480fAC8280"
      - key: KEEPER_HUB_API_KEY
        sync: false
