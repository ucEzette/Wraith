[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "scripts"
solc = "0.8.26"
evm_version = "cancun"
ffi = false
optimizer = true
optimizer_runs = 1000

# Allow transient storage (EIP-1153)
# cancun EVM version includes TSTORE/TLOAD support

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 256
depth = 15

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
